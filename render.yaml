services:
  - type: web
    name: chatvrm-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AGNES_API_KEY
        sync: false
      - key: AGNES_API_BASE
        value: https://apihub.agnes-ai.com
